const $ = (q, el=document) => el.querySelector(q);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function parseValue(test, raw) {
  raw = String(raw).trim();
  if (!raw) return null;
  if (test.unit === "time") {
    const parts = raw.split(":").map(Number);
    if (parts.some(isNaN)) return null;
    if (parts.length === 2) return parts[0]*60 + parts[1];
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    const n = Number(raw);
    return isNaN(n) ? null : n;
  }
  const n = Number(raw);
  return isNaN(n) ? null : n;
}

function fmtValue(test, v) {
  if (v == null || isNaN(v)) return "-";
  if (test.unit === "time") {
    const m = Math.floor(v/60), s = Math.round(v%60);
    return `${m}:${String(s).padStart(2,"0")}`;
  }
  if (test.unit === "sec")  return `${v}s`;
  if (test.unit === "kg")   return `${v} kg`;
  if (test.unit === "cm")   return `${v} cm`;
  if (test.unit === "m")    return `${v} m`;
  if (test.unit === "reps") return `${v} reps`;
  if (test.unit === "level")return `L${v}`;
  if (test.unit === "kmh")  return `${v} km/h`;
  if (test.unit === "pct")  return `${v}%`;
  return v;
}

async function hashPassword(pw) {
  const buf = new TextEncoder().encode(pw + ":krfc-salt");
  const h = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function resizeImage(file, maxDim=600, quality=0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ========================================================= */
/* 5. FIRESTORE SYNC                                          */
/* ========================================================= */

async function initSync() {
  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    state.configError = true;
    state.loading = false;
    render();
    return;
  }
  try {
    onSnapshot(collection(db, "users"), snap => {
      const u = {};
      snap.forEach(d => u[d.id] = d.data());
      state.users = u;
      state.loading = false;
      render();
    });
    onSnapshot(query(collection(db, "entries"), orderBy("date")), snap => {
      state.entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      render();
    });
    onSnapshot(query(collection(db, "checkins"), orderBy("date")), snap => {
      state.checkins = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      render();
    });
  } catch (e) {
    console.error(e);
    state.configError = true;
    state.loading = false;
    render();
  }
}

/* ========================================================= */
/* 6. ACTIONS                                                 */
/* ========================================================= */

async function doAuth() {
  state.authErr = "";
  const uname = $("#f-user").value.trim().toLowerCase();
  const pw    = $("#f-pass").value;
  if (!uname || !pw) { state.authErr = "Username and password required"; render(); return; }
  const hash = await hashPassword(pw);
  try {
    if (state.authMode === "signup") {
      const pos = $("#f-pos").value;
      const ref = doc(db, "users", uname);
      const existing = await getDoc(ref);
      if (existing.exists()) { state.authErr = "Username already taken"; render(); return; }
      await setDoc(ref, { position: pos, passHash: hash });
      state.currentUser = uname;
    } else {
      const ref = doc(db, "users", uname);
      const snap = await getDoc(ref);
      if (!snap.exists()) { state.authErr = "No such user"; render(); return; }
      if (snap.data().passHash !== hash) { state.authErr = "Wrong password"; render(); return; }
      state.currentUser = uname;
    }
    sessionStorage.setItem("krfc_user", state.currentUser);
    render();
  } catch (e) {
    console.error(e);
    state.authErr = "Error: " + e.message;
    render();
  }
}

function logout() {
  state.currentUser = null;
  sessionStorage.removeItem("krfc_user");
  render();
}

async function logResult() {
  const testKey = $("#e-test").value;
  const raw     = $("#e-value").value;
  const date    = $("#e-date").value;
  const test = TESTS.find(t => t.k === testKey);
  const value = parseValue(test, raw);
  if (value == null) { alert("Invalid value"); return; }
  const me = state.users[state.currentUser];
  try {
    await addDoc(collection(db, "entries"), {
      user: state.currentUser, position: me.position,
      test: testKey, value, date
    });
    $("#e-value").value = "";
  } catch (e) {
    alert("Save failed: " + e.message);
  }
}

async function deleteEntry(id) {
  if (!confirm("Delete this result? This cannot be undone.")) return;
  try { await deleteDoc(doc(db, "entries", id)); }
  catch (e) { alert("Delete failed: " + e.message); }
}

async function deleteCheckin(id) {
  if (!confirm("Delete this check-in (including photos)? This cannot be undone.")) return;
  try { await deleteDoc(doc(db, "checkins", id)); }
  catch (e) { alert("Delete failed: " + e.message); }
}

async function handlePhotoUpload(fileList) {
  const files = Array.from(fileList).slice(0, 4); // max 4 photos
  state.checkinSaving = true; render();
  try {
    for (const f of files) {
      if (state.checkinForm.photos.length >= 4) break;
      const dataUrl = await resizeImage(f, 600, 0.6);
      state.checkinForm.photos.push(dataUrl);
    }
  } catch (e) {
    alert("Photo error: " + e.message);
  }
  state.checkinSaving = false;
  render();
}

async function saveCheckin() {
  const weight = parseFloat($("#c-weight").value);
  const date   = $("#c-date").value;
  const notes  = $("#c-notes").value.trim();
  if (isNaN(weight) || weight <= 0) { alert("Enter a valid weight"); return; }
  state.checkinSaving = true; render();
  try {
    await addDoc(collection(db, "checkins"), {
      user: state.currentUser,
      position: state.users[state.currentUser].position,
      date, weight, notes,
      photos: state.checkinForm.photos,
    });
    state.checkinForm = { date:new Date().toISOString().slice(0,10), weight:"", notes:"", photos:[] };
  } catch (e) {
    alert("Save failed: " + e.message + "\n(Photos may be too large — try fewer/smaller images)");
  }
  state.checkinSaving = false;
  render();
}

function removePhotoFromForm(idx) {
  state.checkinForm.photos.splice(idx, 1);

}

function viewMe() {
  const myEntries = state.entries.filter(e => e.user === state.currentUser);
  const myCheckins = state.checkins.filter(c => c.user === state.currentUser);

  // weight chart from check-ins
  let weightCard = "";
  if (myCheckins.length) {
    const sorted = myCheckins.slice().sort((a,b) => a.date.localeCompare(b.date));
    weightCard = `
      <div class="card p-5">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-semibold">Weight (from check-ins)</h3>
          <span class="text-sm text-slate-400">Latest: <span class="text-white font-mono">${sorted[sorted.length-1].weight} kg</span></span>
        </div>
        <div style="height:180px;position:relative"><canvas id="chart-weight"></canvas></div>
      </div>`;
    queueMicrotask(() => {
      const el = document.getElementById("chart-weight");
      if (!el) return;
      if (chartInstances.weight) chartInstances.weight.destroy();
      chartInstances.weight = new Chart(el, {
        type: "line",
        data: { labels: sorted.map(c=>c.date), datasets: [{ label:"Weight", data: sorted.map(c=>c.weight), borderColor:"#10b981", backgroundColor:"rgba(16,185,129,0.2)", tension:0.2, fill:true }] },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.parsed.y+" kg"}}}, scales:{x:{ticks:{color:"#94a3b8"},grid:{color:"#1e293b"}}, y:{ticks:{color:"#94a3b8"},grid:{color:"#1e293b"}}} }
      });
    });
  }

  if (!myEntries.length && !myCheckins.length) return `<p class="text-slate-400">No results logged yet. Head to the Log or Check-in tab.</p>`;

  const byTest = {};
  myEntries.forEach(e => { (byTest[e.test] = byTest[e.test] || []).push(e); });
  const cards = Object.entries(byTest).map(([tk, arr]) => {
    const t = TESTS.find(x=>x.k===tk); if (!t) return "";
    arr.sort((a,b) => a.date.localeCompare(b.date));
    const best = t.lowerBetter ? Math.min(...arr.map(e=>e.value)) : Math.max(...arr.map(e=>e.value));
    return `
      <div class="card p-5">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-semibold">${t.label}</h3>
          <span class="text-sm text-slate-400">Best: <span class="text-white font-mono">${fmtValue(t,best)}</span></span>
        </div>
        <div style="height:180px;position:relative"><canvas id="chart-${tk}"></canvas></div>
      </div>`;
  }).join("");

  // recent entries list with delete
  const recentEntries = myEntries.slice().sort((a,b) => b.date.localeCompare(a.date));
  const entriesList = recentEntries.length ? `
    <div class="card p-5">
      <h3 class="font-semibold mb-3">All My Results (${recentEntries.length})</h3>
      <div class="divide-y divide-slate-800 text-sm">
        ${recentEntries.map(e => {
          const t = TESTS.find(x=>x.k===e.test);
          return `<div class="flex items-center justify-between py-2">
            <div>
              <div class="font-medium">${t ? esc(t.label) : esc(e.test)}</div>
              <div class="text-xs text-slate-500">${esc(e.date)}</div>
            </div>
            <div class="flex items-center gap-3">
              <span class="font-mono">${t ? fmtValue(t, e.value) : e.value}</span>
              <button data-act="del-entry" data-id="${e.id}" class="text-red-400 hover:text-red-300 text-xs">Delete</button>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>` : "";

  queueMicrotask(() => {
    Object.entries(byTest).forEach(([tk, arr]) => {
      const t = TESTS.find(x=>x.k===tk);
      const el = document.getElementById("chart-"+tk);
      if (!el) return;
      if (chartInstances[tk]) chartInstances[tk].destroy();
      chartInstances[tk] = new Chart(el, {
        type: "line",
        data: {
          labels: arr.map(e=>e.date),
          datasets: [{ label: t.label, data: arr.map(e=>e.value), borderColor:"#3b82f6", backgroundColor:"rgba(59,130,246,0.2)", tension:0.2, fill:true }]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: {
            legend:{display:false},
            tooltip:{ callbacks:{ label: ctx => fmtValue(t, ctx.parsed.y) } }
          },
          scales: {
            x:{ ticks:{color:"#94a3b8"}, grid:{color:"#1e293b"} },
            y:{ reverse: t.lowerBetter, ticks:{color:"#94a3b8", callback: v => t.unit==='time'?fmtValue(t,v):v}, grid:{color:"#1e293b"} }
          }
        }
      });
    });
  });
  return `<div class="space-y-4"><h2 class="text-xl font-bold">My Progress</h2>${weightCard}${cards}${entriesList}</div>`;
}

function viewBoard() {
  const test = TESTS.find(t => t.k === state.filterTest) || TESTS[0];
  const rows = state.entries.filter(e => e.test === state.filterTest && (state.filterPos === "All" || e.position === state.filterPos));
  const bestByUser = {};
  rows.forEach(e => {
    const cur = bestByUser[e.user];
    if (!cur || (test.lowerBetter ? e.value < cur.value : e.value > cur.value)) bestByUser[e.user] = e;
  });
  const board = Object.values(bestByUser).sort((a,b) => test.lowerBetter ? a.value-b.value : b.value-a.value);

  const optsByCat = {};
  TESTS.forEach(t => { (optsByCat[t.cat] = optsByCat[t.cat] || []).push(t); });
  const testOpts = Object.entries(optsByCat).map(([cat,arr]) =>
    `<optgroup label="${cat}">${arr.map(t=>`<option value="${t.k}" ${t.k===state.filterTest?'selected':''}>${t.label}</option>`).join("")}</optgroup>`
  ).join("");
  const posOpts = `<option>All</option>${POSITIONS.map(p=>`<option ${p===state.filterPos?'selected':''}>${p}</option>`).join("")}`;

  const table = board.length === 0
    ? `<p class="p-6 text-slate-400">No results for this filter yet.</p>`
    : `<table class="w-full text-sm">
        <thead class="bg-slate-800/50 text-slate-400">
          <tr><th class="text-left p-3">#</th><th class="text-left p-3">Player</th><th class="text-left p-3">Position</th><th class="text-right p-3">Best</th><th class="text-right p-3">Date</th></tr>
        </thead>
        <tbody>
          ${board.map((e,i)=>`
            <tr class="border-t border-slate-800 ${e.user===state.currentUser?'bg-blue-900/30':''}">
              <td class="p-3 font-bold">${i+1}</td>
              <td class="p-3">${esc(e.user)}</td>
              <td class="p-3 text-slate-400">${esc(e.position)}</td>
              <td class="p-3 text-right font-mono">${fmtValue(test,e.value)}</td>
              <td class="p-3 text-right text-slate-400">${esc(e.date)}</td>
            </tr>`).join("")}
        </tbody>
      </table>`;

  return `
    <h2 class="text-xl font-bold mb-4">Leaderboard</h2>
    <div class="flex flex-wrap gap-3 mb-4">
      <select data-act="filter-test" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">${testOpts}</select>
      <select data-act="filter-pos"  class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">${posOpts}</select>
    </div>
    <div class="card overflow-hidden">${table}</div>`;
}

function viewTeam() {
  const names = Object.keys(state.users);
  if (!names.length) return `<p class="text-slate-400">No players yet.</p>`;
  return `
    <h2 class="text-xl font-bold mb-4">Squad (${names.length})</h2>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
      ${names.map(n => {
        const count = state.entries.filter(e => e.user === n).length;
        return `<div class="card p-4">
          <div class="font-semibold">${esc(n)}</div>
          <div class="text-sm text-slate-400">${esc(state.users[n].position||"")}</div>
          <div class="text-xs text-slate-500 mt-2">${count} result${count!==1?'s':''} logged</div>
        </div>`;
      }).join("")}
    </div>`;
}

/* ========================================================= */
/* 8. RENDER + EVENTS                                         */
/* ========================================================= */

function render() {
  const root = $("#app");
  if (state.configError) { root.innerHTML = viewConfigError(); return; }
  if (state.loading)     { root.innerHTML = `<div class="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>`; return; }
  if (!state.currentUser || !state.users[state.currentUser]) {
    if (state.currentUser && !state.users[state.currentUser]) { /* user missing, stay on auth */ state.currentUser = null; sessionStorage.removeItem("krfc_user"); }
    root.innerHTML = viewAuth();
    return;
  }
  let body = "";
  if (state.tab === "log")     body = viewLog();
  if (state.tab === "checkin") body = viewCheckin();
  if (state.tab === "me")      body = viewMe();
  if (state.tab === "board")   body = viewBoard();
  if (state.tab === "team")    body = viewTeam();
  root.innerHTML = viewHeader() + `<main class="max-w-5xl mx-auto p-4">${body}</main>` + (state.lightbox ? `<div data-act="close-lightbox" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 cursor-pointer"><img src="${state.lightbox}" class="max-w-full max-h-full rounded-lg"/></div>` : "");
}

document.addEventListener("click", e => {
  const b = e.target.closest("[data-act]");
  if (!b) return;
  const a = b.dataset.act;
  if (a === "mode-login")  { state.authMode = "login";  state.authErr=""; render(); }
  if (a === "mode-signup") { state.authMode = "signup"; state.authErr=""; render(); }
  if (a === "auth")        doAuth();
  if (a === "logout")      logout();
  if (a === "tab")         { state.tab = b.dataset.tab; render(); }
  if (a === "log")         logResult();
  if (a === "del-entry")   deleteEntry(b.dataset.id);
  if (a === "del-checkin") deleteCheckin(b.dataset.id);
  if (a === "save-checkin"){
    state.checkinForm.date   = $("#c-date").value;
    state.checkinForm.weight = $("#c-weight").value;
    state.checkinForm.notes  = $("#c-notes").value;
    saveCheckin();
  }
  if (a === "rm-photo")    removePhotoFromForm(parseInt(b.dataset.idx,10));
  if (a === "lightbox")    {
    const ci = state.checkins.find(c => c.id === b.dataset.checkin);
    if (ci) { state.lightbox = ci.photos[parseInt(b.dataset.src,10)]; render(); }
  }
  if (a === "close-lightbox") { state.lightbox = null; render(); }
});

document.addEventListener("change", e => {
  const b = e.target.closest("[data-act]");
  if (!b) return;
  const a = b.dataset.act;
  if (a === "entry-test")  { state.entryForm.test = b.value; render(); }
  if (a === "filter-test") { state.filterTest = b.value; render(); }
  if (a === "filter-pos")  { state.filterPos  = b.value; render(); }
  if (a === "photo-input") { handlePhotoUpload(b.files); b.value = ""; }
});

/* ========================================================= */
/* 9. GO                                                      */
/* ========================================================= */
render();
initSync();
</script>
</body>
</html>
